name: Test Robustness Verification

on:
  push:
    branches: [main, develop]
    paths:
      - '**.py'
      - '**.ts'
      - '**.tsx'
      - 'tests/**'
      - '.github/workflows/test-robustness.yml'
      - 'scripts/test-robustness.sh'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.py'
      - '**.ts'
      - '**.tsx'
      - 'tests/**'
      - '.github/workflows/test-robustness.yml'
      - 'scripts/test-robustness.sh'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  MUTATION_THRESHOLD: 70

jobs:
  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: '10.2.0'
      
      - name: Install Next.js dependencies
        working-directory: nextjs
        run: pnpm install --frozen-lockfile
      
      - name: Run Stryker mutation testing
        working-directory: nextjs
        run: |
          pnpm stryker run 2>&1 | tee stryker-output.log || true
          if [ -f "reports/mutation/mutation-report.json" ]; then
            SCORE=$(python3 -c "import json; d=json.load(open('reports/mutation/mutation-report.json')); print(int(d.get('mutationScore', 0)))" 2>/dev/null || echo "0")
            echo "Mutation Score: ${SCORE}%"
            if [ "$SCORE" -lt $MUTATION_THRESHOLD ]; then
              echo "::error::Mutation score below threshold"
              exit 1
            fi
          fi
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: nextjs/reports/mutation/
          retention-days: 30

  python-mutation:
    name: Python Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      
      - uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
      
      - run: uv python install 3.11
      
      - name: Run mutmut on Domain
        working-directory: fastapi-domain
        run: |
          uv sync --all-groups
          uv run mutmut run --paths-to-mutate="app/" --tests-dir="tests/" || true
          uv run mutmut results > ../mutmut-domain.txt || true
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutmut-reports
          path: mutmut-*.txt
          retention-days: 30

  contract-tests:
    name: Contract Violation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: '10.2.0'
      
      - working-directory: nextjs
        run: pnpm install --frozen-lockfile
      
      - name: Run contract tests
        working-directory: nextjs
        run: pnpm vitest run tests/api/contract-drift.test.ts
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: nextjs/contract-test-results.log
          retention-days: 30

  test-quality:
    name: Test Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Analyze test quality
        run: |
          mkdir -p reports
          echo "Test Quality Report" > reports/quality.md
          echo "Date: $(date)" >> reports/quality.md
          echo "" >> reports/quality.md
          WEAK=$(grep -r "\.status == 200" nextjs/tests/ 2>/dev/null | wc -l)
          echo "Weak assertions: $WEAK" >> reports/quality.md
          cat reports/quality.md
      
      - uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: reports/
          retention-days: 30
