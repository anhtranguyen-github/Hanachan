name: FastAPI Agents CI

on:
  push:
    branches: ["**"]
    paths:
      - "fastapi-agents/**"
      - ".github/workflows/fastapi-agents-ci.yml"
      - ".github/scripts/generate-openapi.py"
  pull_request:
    branches: ["**"]
    paths:
      - "fastapi-agents/**"
      - ".github/workflows/fastapi-agents-ci.yml"
      - ".github/scripts/generate-openapi.py"

defaults:
  run:
    working-directory: fastapi-agents

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run bandit security scan
        run: uv run bandit -r app/ -ll

  test:
    name: Pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        env:
          PYTHONPATH: .
          OPENAI_API_KEY: sk-test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-anon-key
          SUPABASE_JWT_SECRET: test-jwt-secret-32-chars-minimum!!
          QDRANT_URL: http://localhost:6333
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test-password
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
        run: |
          uv run pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml

      - name: Generate OpenAPI Spec
        run: |
          mkdir -p ../nextjs/openapi
          PYTHONPATH=. uv run python ../.github/scripts/generate-openapi.py . ../nextjs/openapi/agents.json

      - name: Upload OpenAPI Spec
        uses: actions/upload-artifact@v4
        with:
          name: agents-openapi
          path: nextjs/openapi/agents.json

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: fastapi-agents/coverage.xml
          flags: fastapi-agents
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
