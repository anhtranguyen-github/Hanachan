name: Monorepo Integrated Test Suite

on:
  push:
    branches: [main, develop, custom-deck]
  pull_request:
    branches: [main, develop, custom-deck]

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-key' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'test-service-key-32-chars-at-least-wow' }}

jobs:
  # 1. FastAPI Domain Tests
  domain-tests:
    name: Domain Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.11
      - name: Install dependencies
        working-directory: fastapi-domain
        run: uv sync --dev
      - name: Run Pytest
        working-directory: fastapi-domain
        run: uv run pytest tests/ -v

  # 2. FastAPI Agents Tests
  agents-tests:
    name: Agents Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Setup Python
        run: uv python install 3.11
      - name: Install dependencies
        working-directory: fastapi-agents
        run: uv sync --dev
      - name: Run Pytest
        working-directory: fastapi-agents
        run: uv run pytest tests/ -v

  # 3. Next.js Frontend Tests
  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.2.0"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: nextjs/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: nextjs
        run: pnpm install --frozen-lockfile
      - name: Run Unit Tests
        working-directory: nextjs
        run: pnpm test:unit

  # 4. Monorepo Integration & Quality (The bridge)
  integration-quality:
    name: Integration & Hygiene
    runs-on: ubuntu-latest
    needs: [domain-tests, agents-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Run Unified Quality Guard
        run: ./scripts/quality-check.sh
      - name: Check Architecture Boundaries
        run: python3 scripts/architecture-guard.py
