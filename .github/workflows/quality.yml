name: Code Quality Guard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies (fastapi-agents)
      run: |
        cd fastapi-agents
        uv sync --dev
        
    - name: Install dependencies (fastapi-domain)
      run: |
        cd fastapi-domain
        uv sync --dev
        
    - name: Run Unified Quality Check
      run: ./scripts/quality-check.sh
