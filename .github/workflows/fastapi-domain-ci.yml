name: FastAPI Domain CI

on:
  push:
    branches: ["**"]
    paths:
      - "fastapi-domain/**"
      - ".github/workflows/fastapi-domain-ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "fastapi-domain/**"
      - ".github/workflows/fastapi-domain-ci.yml"

defaults:
  run:
    working-directory: fastapi-domain

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'test-service-key' }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET || 'test-jwt-secret-32-chars-minimum!!' }}
        run: |
          uv run pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml
