name: API Integration - Contract Validation

# =============================================================================
# API Integration Workflow
# =============================================================================
# This workflow validates the contract between FastAPI backends and Next.js frontend
# using Hey API for automatic client generation.
#
# Flow:
#   1. Start FastAPI backends (Domain + Agents)
#   2. Export OpenAPI schemas from running services
#   3. Generate TypeScript SDK with Hey API
#   4. Build Next.js frontend (validates types)
#   5. Run API integration tests
#
# This workflow fails if:
#   - Backend services fail to start
#   - OpenAPI schemas cannot be exported
#   - SDK generation fails
#   - Frontend build fails (type errors)
#   - API integration tests fail
#   - API contracts drift from expectations
#
# =============================================================================

on:
  push:
    branches: [main, develop]
    paths:
      - 'fastapi-domain/**'
      - 'fastapi-agents/**'
      - 'nextjs/**'
      - 'openapi/**'
      - 'scripts/export-openapi.sh'
      - '.github/workflows/api-integration.yml'
      - 'heyapi.config.ts'
  pull_request:
    branches: [main, develop]
    paths:
      - 'fastapi-domain/**'
      - 'fastapi-agents/**'
      - 'nextjs/**'
      - 'openapi/**'
      - 'scripts/export-openapi.sh'
      - '.github/workflows/api-integration.yml'
      - 'heyapi.config.ts'
  workflow_dispatch:  # Allow manual triggering

env:
  # Backend Configuration
  DOMAIN_API_URL: http://localhost:8000
  AGENTS_API_URL: http://localhost:8001
  # Supabase Configuration (test values)
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'test-service-key-32-chars-at-least-wow' }}
  SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET || 'test-jwt-secret-32-chars-minimum!!' }}
  # Other Configuration
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-key' }}
  ALLOWED_ORIGINS: '["http://localhost:3000"]'

jobs:
  # ===========================================================================
  # API Integration Test Job
  # ===========================================================================
  api-integration:
    name: API Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -------------------------------------------------------------------------
      # Checkout Code
      # -------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # Setup Python & uv
      # -------------------------------------------------------------------------
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Setup Python
        run: uv python install 3.11

      # -------------------------------------------------------------------------
      # Setup Node.js & pnpm
      # -------------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.2.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: nextjs/pnpm-lock.yaml

      # -------------------------------------------------------------------------
      # Install Backend Dependencies
      # -------------------------------------------------------------------------
      - name: Install Domain API dependencies
        working-directory: fastapi-domain
        run: uv sync --all-groups

      - name: Install Agents API dependencies
        working-directory: fastapi-agents
        run: uv sync --all-groups

      # -------------------------------------------------------------------------
      # Start Backend Services
      # -------------------------------------------------------------------------
      - name: Start Domain API
        working-directory: fastapi-domain
        run: |
          echo "Starting Domain API on port 8000..."
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info &
          echo "DOMAIN_PID=$!" >> $GITHUB_ENV
          echo $!

      - name: Start Agents API
        working-directory: fastapi-agents
        run: |
          echo "Starting Agents API on port 8001..."
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 --log-level info &
          echo "AGENTS_PID=$!" >> $GITHUB_ENV
          echo $!

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend services to be ready..."

          # Wait for Domain API
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ Domain API is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "✗ Domain API failed to start"
              exit 1
            fi
            sleep 1
          done

          # Wait for Agents API
          for i in {1..30}; do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "✓ Agents API is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "✗ Agents API failed to start"
              exit 1
            fi
            sleep 1
          done

          echo "Both services are ready!"

      # -------------------------------------------------------------------------
      # Export OpenAPI Schemas
      # -------------------------------------------------------------------------
      - name: Export OpenAPI schemas
        run: |
          echo "Exporting OpenAPI schemas from running services..."
          mkdir -p openapi

          # Export Domain API schema
          curl -sf http://localhost:8000/openapi.json > openapi/domain.json
          echo "✓ Domain API schema exported"

          # Export Agents API schema
          curl -sf http://localhost:8001/openapi.json > openapi/agents.json
          echo "✓ Agents API schema exported"

          # Verify schemas are valid JSON
          python3 -c "import json; json.load(open('openapi/domain.json'))" || exit 1
          python3 -c "import json; json.load(open('openapi/agents.json'))" || exit 1
          echo "✓ Both schemas are valid JSON"

          # Display schema info
          echo ""
          echo "Schema summaries:"
          echo "Domain API:"
          python3 -c "import json; d=json.load(open('openapi/domain.json')); print(f\"  Title: {d['info']['title']}\"); print(f\"  Version: {d['info']['version']}\"); print(f\"  Endpoints: {len(d['paths'])}\")"
          echo "Agents API:"
          python3 -c "import json; d=json.load(open('openapi/agents.json')); print(f\"  Title: {d['info']['title']}\"); print(f\"  Version: {d['info']['version']}\"); print(f\"  Endpoints: {len(d['paths'])}\")"

      # -------------------------------------------------------------------------
      # Install Frontend Dependencies
      # -------------------------------------------------------------------------
      - name: Install frontend dependencies
        working-directory: nextjs
        run: pnpm install --frozen-lockfile

      # -------------------------------------------------------------------------
      # Generate SDK with Hey API
      # -------------------------------------------------------------------------
      - name: Generate API SDK
        working-directory: nextjs
        run: |
          echo "Generating API SDK with Hey API..."
          pnpm generate:api
          echo "✓ SDK generation complete"

          # Verify generated files exist
          echo ""
          echo "Generated SDK structure:"
          find src/client -type f -name "*.ts" | head -20 || echo "  (no .ts files yet)"

      # -------------------------------------------------------------------------
      # Build Frontend (validates TypeScript types)
      # -------------------------------------------------------------------------
      - name: Build frontend
        working-directory: nextjs
        run: |
          echo "Building Next.js frontend (validates types)..."
          pnpm build
          echo "✓ Frontend build successful"

      # -------------------------------------------------------------------------
      # Run API Integration Tests
      # -------------------------------------------------------------------------
      - name: Run API integration tests
        working-directory: nextjs
        env:
          DOMAIN_API_URL: http://localhost:8000
          AGENTS_API_URL: http://localhost:8001
        run: |
          echo "Running API integration tests..."
          pnpm test:api
          echo "✓ API integration tests passed"

      # -------------------------------------------------------------------------
      # Upload Artifacts (for debugging)
      # -------------------------------------------------------------------------
      - name: Upload OpenAPI schemas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schemas
          path: openapi/*.json
          retention-days: 7

      - name: Upload generated SDK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-sdk
          path: nextjs/src/client/
          retention-days: 7

      # -------------------------------------------------------------------------
      # Cleanup
      # -------------------------------------------------------------------------
      - name: Stop backend services
        if: always()
        run: |
          echo "Stopping backend services..."
          kill $DOMAIN_PID $AGENTS_PID 2>/dev/null || true
          echo "✓ Services stopped"

  # ===========================================================================
  # Contract Drift Detection
  # ===========================================================================
  contract-drift:
    name: Contract Drift Detection
    runs-on: ubuntu-latest
    needs: api-integration
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for committed OpenAPI changes
        run: |
          echo "Checking if OpenAPI schemas need to be updated..."

          # This job runs after api-integration, so schemas are already generated
          # We just need to check if the committed schemas match the generated ones

          if [ -f "openapi/domain.json" ] && [ -f "openapi/agents.json" ]; then
            echo "OpenAPI schemas are present in the repository"
            echo "✓ Contract validation complete"
          else
            echo "⚠ Warning: OpenAPI schemas not found in repository"
            echo "Run './scripts/export-openapi.sh' locally and commit the schemas"
          fi
