version: '3.8'

# ─── Hanachan — Full Stack Docker Compose ────────────────────────────────────
# Services:
#   nextjs   — Next.js 14 frontend (port 3000)
#   fastapi-agents  — FastAPI memory backend (port 6100)
#   qdrant   — Vector database (ports 6333, 6334)
#   neo4j    — Graph database (ports 7474, 7687)
#
# Usage:
#   docker compose up                  # start all services
#   docker compose up --build          # rebuild images
#   docker compose run --rm fastapi-test  # run pytest
#   docker compose run --rm nextjs-test   # run vitest
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Next.js Frontend ────────────────────────────────────────────────────────
  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - ./nextjs/.env
    environment:
      - NODE_ENV=production
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── FastAPI Memory Backend ───────────────────────────────────────────────────
  fastapi:
    build:
      context: ./fastapi-agents
      dockerfile: Dockerfile
      target: runner
    ports:
      - "6100:6100"
    env_file:
      - ./fastapi-agents/.env
    environment:
      - FASTAPI_CORE_URL=http://core:6200/api/v1
    depends_on:
      core:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6100/openapi.json')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── FastAPI Core Service (SSOT) ─────────────────────────────────────────────
  core:
    build:
      context: ./fastapi-core
      dockerfile: Dockerfile
      target: runner
    ports:
      - "6200:6200"
    env_file:
      - ./fastapi-core/.env
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6200/openapi.json')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Local Docker Registry ───────────────────────────────────────────────────
  registry:
    image: registry:2
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - app-network
    restart: unless-stopped

  # ── Qdrant Vector Database ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT_ALLOW_RECOVERY_MODE=true
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Neo4j Graph Database ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "gds"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── FastAPI Test Runner ──────────────────────────────────────────────────────
  fastapi-test:
    build:
      context: ./fastapi-agents
      dockerfile: Dockerfile
      target: test
    env_file:
      - ./fastapi-agents/.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-test-key}
      - SUPABASE_URL=${SUPABASE_URL:-https://test.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-test-anon-key}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-test-jwt-secret-32-chars-minimum!!}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-test_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-test-password}
    networks:
      - app-network
    profiles:
      - test

  # ── Next.js Test Runner ──────────────────────────────────────────────────────
  nextjs-test:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
      target: deps
    command: >
      sh -c "ppnpm run test"
    environment:
      - NODE_ENV=test
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://test.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-test-anon-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-test-key}
      - AGENTS_API_URL=${AGENTS_API_URL:-http://fastapi:6100}
      - FASTAPI_CORE_URL=${FASTAPI_CORE_URL:-http://core:6200}
    networks:
      - app-network
    profiles:
      - test

volumes:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  registry-data:

networks:
  app-network:
    driver: bridge
